<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="話している間にシフトができる - Claude Codeで勤務表を自動作成">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF0080"/>
      <stop offset="50%" stop-color="#a020c0"/>
      <stop offset="100%" stop-color="#7928CA"/>
    </linearGradient>
    <linearGradient id="paperGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f7fa"/>
    </linearGradient>
    <linearGradient id="cellFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#ff80c0"/>
    </linearGradient>
    <radialGradient id="orbGrad" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="720" height="420" rx="20" fill="url(#bgGrad)"/>
  <!-- 装飾オーブ -->
  <circle cx="120" cy="80" r="160" fill="url(#orbGrad)"/>
  <circle cx="640" cy="360" r="140" fill="url(#orbGrad)"/>
  <!-- ドットパターン -->
  <g fill="#ffffff" opacity="0.12">
    <circle cx="60" cy="60" r="1.5"/><circle cx="120" cy="60" r="1.5"/><circle cx="180" cy="60" r="1.5"/>
    <circle cx="60" cy="120" r="1.5"/><circle cx="120" cy="120" r="1.5"/>
    <circle cx="60" cy="360" r="1.5"/><circle cx="120" cy="360" r="1.5"/><circle cx="180" cy="360" r="1.5"/>
    <circle cx="600" cy="60" r="1.5"/><circle cx="660" cy="60" r="1.5"/>
  </g>

  <!-- ============ 左：会話パート ============ -->
  <!-- 講師アバター -->
  <g transform="translate(60,150)">
    <circle cx="34" cy="34" r="34" fill="#ffffff" opacity="0.95"/>
    <text x="34" y="44" font-size="32" text-anchor="middle" font-family="system-ui, sans-serif">👨‍🏫</text>
  </g>
  <!-- 質問役アバター -->
  <g transform="translate(60,240)">
    <circle cx="34" cy="34" r="34" fill="#ffffff" opacity="0.95"/>
    <text x="34" y="44" font-size="32" text-anchor="middle" font-family="system-ui, sans-serif">🙋</text>
  </g>
  <!-- 吹き出し（講師） -->
  <g filter="url(#softShadow)">
    <path d="M140,160 Q140,145 155,145 L300,145 Q315,145 315,160 L315,200 Q315,215 300,215 L175,215 L160,232 L165,215 L155,215 Q140,215 140,200 Z"
          fill="#ffffff" opacity="0.95"/>
    <text x="227" y="180" font-size="13" text-anchor="middle" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="700" fill="#1a202c">私が話している間に</text>
    <text x="227" y="200" font-size="13" text-anchor="middle" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="700" fill="#7928CA">シフトができていく</text>
  </g>
  <!-- 吹き出し（質問役） -->
  <g filter="url(#softShadow)">
    <path d="M140,250 Q140,235 155,235 L290,235 Q305,235 305,250 L305,290 Q305,305 290,305 L175,305 L160,322 L165,305 L155,305 Q140,305 140,290 Z"
          fill="#ffffff" opacity="0.95"/>
    <text x="222" y="270" font-size="13" text-anchor="middle" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="700" fill="#1a202c">えっ、もうできて</text>
    <text x="222" y="290" font-size="13" text-anchor="middle" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="700" fill="#FF0080">るんですか…！</text>
  </g>

  <!-- ============ 中央：矢印＋AI ============ -->
  <g transform="translate(330,200)">
    <!-- AI コア -->
    <circle cx="0" cy="0" r="32" fill="#ffffff" opacity="0.18"/>
    <circle cx="0" cy="0" r="22" fill="#ffffff" opacity="0.95"/>
    <text x="0" y="6" font-size="20" text-anchor="middle" font-family="system-ui, sans-serif">🤖</text>
    <!-- 中央のラベル -->
    <text x="0" y="58" font-size="11" text-anchor="middle" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="700" fill="#ffffff" opacity="0.9">Claude Code</text>
    <!-- 矢印 -->
    <g stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round">
      <line x1="32" y1="-10" x2="80" y2="-10"/>
      <line x1="72" y1="-16" x2="80" y2="-10"/>
      <line x1="72" y1="-4" x2="80" y2="-10"/>

      <line x1="32" y1="10" x2="80" y2="10"/>
      <line x1="72" y1="4" x2="80" y2="10"/>
      <line x1="72" y1="16" x2="80" y2="10"/>
    </g>
  </g>

  <!-- ============ 右：シフト表 ============ -->
  <g transform="translate(450,90)" filter="url(#softShadow)">
    <!-- 用紙 -->
    <rect width="230" height="240" rx="12" fill="url(#paperGrad)"/>
    <!-- ヘッダ帯 -->
    <rect width="230" height="34" rx="12" fill="#1a202c"/>
    <rect y="22" width="230" height="12" fill="#1a202c"/>
    <text x="115" y="22" font-size="12" text-anchor="middle" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="700" fill="#ffffff">勤務表 2026年6月</text>

    <!-- 列ヘッダ -->
    <g font-size="9" font-family="'Noto Sans JP', system-ui, sans-serif" fill="#666666" font-weight="700">
      <text x="34" y="50" text-anchor="middle">氏名</text>
      <text x="84" y="50" text-anchor="middle">月</text>
      <text x="106" y="50" text-anchor="middle">火</text>
      <text x="128" y="50" text-anchor="middle">水</text>
      <text x="150" y="50" text-anchor="middle">木</text>
      <text x="172" y="50" text-anchor="middle">金</text>
      <text x="194" y="50" text-anchor="middle">土</text>
      <text x="216" y="50" text-anchor="middle">日</text>
    </g>
    <line x1="14" y1="58" x2="216" y2="58" stroke="#e2e8f0" stroke-width="1"/>

    <!-- 行：データ -->
    <g font-size="9" font-family="'Noto Sans JP', system-ui, sans-serif" fill="#333333">
      <!-- 行1: 完成 -->
      <text x="14" y="76" font-weight="700">A</text>
      <rect x="74" y="66" width="20" height="14" rx="3" fill="url(#cellFill)" opacity="0.85"/>
      <text x="84" y="76" text-anchor="middle">日</text>
      <rect x="96" y="66" width="20" height="14" rx="3" fill="#bfdbfe"/>
      <text x="106" y="76" text-anchor="middle">早</text>
      <rect x="118" y="66" width="20" height="14" rx="3" fill="#1a202c"/>
      <text x="128" y="76" text-anchor="middle" fill="#ffffff">夜</text>
      <rect x="140" y="66" width="20" height="14" rx="3" fill="#f1f5f9"/>
      <text x="150" y="76" text-anchor="middle">明</text>
      <rect x="162" y="66" width="20" height="14" rx="3" fill="#fed7aa"/>
      <text x="172" y="76" text-anchor="middle">休</text>
      <rect x="184" y="66" width="20" height="14" rx="3" fill="url(#cellFill)"/>
      <text x="194" y="76" text-anchor="middle">日</text>
      <rect x="206" y="66" width="20" height="14" rx="3" fill="#bfdbfe"/>
      <text x="216" y="76" text-anchor="middle">早</text>

      <!-- 行2: 完成 -->
      <text x="14" y="100" font-weight="700">B</text>
      <rect x="74" y="90" width="20" height="14" rx="3" fill="#bfdbfe"/>
      <text x="84" y="100" text-anchor="middle">早</text>
      <rect x="96" y="90" width="20" height="14" rx="3" fill="url(#cellFill)"/>
      <text x="106" y="100" text-anchor="middle">日</text>
      <rect x="118" y="90" width="20" height="14" rx="3" fill="#fed7aa"/>
      <text x="128" y="100" text-anchor="middle">休</text>
      <rect x="140" y="90" width="20" height="14" rx="3" fill="#1a202c"/>
      <text x="150" y="100" text-anchor="middle" fill="#ffffff">夜</text>
      <rect x="162" y="90" width="20" height="14" rx="3" fill="#f1f5f9"/>
      <text x="172" y="100" text-anchor="middle">明</text>
      <rect x="184" y="90" width="20" height="14" rx="3" fill="url(#cellFill)"/>
      <text x="194" y="100" text-anchor="middle">日</text>
      <rect x="206" y="90" width="20" height="14" rx="3" fill="url(#cellFill)"/>
      <text x="216" y="100" text-anchor="middle">日</text>

      <!-- 行3: 半分まで -->
      <text x="14" y="124" font-weight="700">C</text>
      <rect x="74" y="114" width="20" height="14" rx="3" fill="url(#cellFill)"/>
      <text x="84" y="124" text-anchor="middle">日</text>
      <rect x="96" y="114" width="20" height="14" rx="3" fill="#bfdbfe"/>
      <text x="106" y="124" text-anchor="middle">早</text>
      <rect x="118" y="114" width="20" height="14" rx="3" fill="#1a202c"/>
      <text x="128" y="124" text-anchor="middle" fill="#ffffff">夜</text>
      <rect x="140" y="114" width="20" height="14" rx="3" fill="#f1f5f9"/>
      <text x="150" y="124" text-anchor="middle">明</text>
      <!-- スキャンライン -->
      <rect x="162" y="114" width="64" height="14" rx="3" fill="#e2e8f0" opacity="0.6"/>
      <line x1="162" y1="121" x2="226" y2="121" stroke="#FF0080" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>

      <!-- 行4: 生成中 -->
      <text x="14" y="148" font-weight="700" opacity="0.5">D</text>
      <rect x="74" y="138" width="152" height="14" rx="3" fill="#e2e8f0" opacity="0.5"/>

      <!-- 行5: 未生成 -->
      <text x="14" y="172" font-weight="700" opacity="0.35">E</text>
      <rect x="74" y="162" width="152" height="14" rx="3" fill="#e2e8f0" opacity="0.35"/>
    </g>

    <!-- 進捗バー -->
    <rect x="14" y="194" width="202" height="6" rx="3" fill="#e2e8f0"/>
    <rect x="14" y="194" width="125" height="6" rx="3" fill="url(#cellFill)"/>
    <text x="14" y="218" font-size="9" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="700" fill="#7928CA">生成中… 62%</text>
    <text x="216" y="218" font-size="9" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="700" fill="#22c55e" text-anchor="end">✓ ルール反映済</text>
  </g>

  <!-- ============ 上部キャプション ============ -->
  <g transform="translate(360,42)">
    <rect x="-185" y="-22" width="370" height="36" rx="18" fill="#ffffff" opacity="0.18"/>
    <text x="0" y="3" font-size="15" text-anchor="middle" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="900" fill="#ffffff">話している間に、シフトができる。</text>
  </g>

  <!-- ============ 下部タイマー ============ -->
  <g transform="translate(360,386)">
    <rect x="-90" y="-14" width="180" height="22" rx="11" fill="#1a202c" opacity="0.55"/>
    <text x="0" y="2" font-size="11" text-anchor="middle" font-family="'Noto Sans JP', system-ui, sans-serif" font-weight="700" fill="#ffffff">⏱ 30分の対談で、1日分の仕事が消える</text>
  </g>
</svg>
