services:
  - type: web
    name: sns-auto-poster
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT "web_ui:create_app()"
    plan: free
    envVars:
      - key: SNS_THEME
        value: 介護現場でのAI活用・業務効率化
      - key: BUSINESS_NAME
        value: ホリエモンAI学校介護校
      - key: SCHEDULE_TIME
        value: "09:00"
      - key: GROQ_API_KEY
        sync: false
      - key: DASHBOARD_USER
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
